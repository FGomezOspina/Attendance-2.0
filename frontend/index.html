<!-- frontend/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Asistencia</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Incluir SheetJS desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Barra de Navegación -->
    <nav>
        <div class="nav-container">
            <h1>Asistencia</h1>
            <ul class="nav-links">
                <li><a href="#" id="nav-empleados">Empleados</a></li>
                <li><a href="#" id="nav-asistencia">Asistencia</a></li>
            </ul>
            <!-- Botón de Menú para pantallas pequeñas -->
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <div class="container">
        <!-- Sección de Empleados -->
        <div id="section-empleados">
            <h2>Gestión de Empleados</h2>
            
            <!-- Formulario para agregar empleados -->
            <form id="add-employee-form">
                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" required>
                
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
                
                <label for="area">Área:</label>
                <input type="text" id="area" name="area" required>
                
                <button type="submit">Agregar Empleado</button>
            </form>
            <div id="employee-message"></div>

            <!-- Buscar Empleados -->
            <div class="search-container">
                <input type="text" id="search-employees-input" placeholder="Buscar empleados por cédula, nombre o área...">
            </div>
            
            <!-- Tabla de Empleados -->
            <div class="table-responsive">
                <table id="employees-table">
                    <thead>
                        <tr>
                            <th>Cédula</th>
                            <th>Nombre</th>
                            <th>Área</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filas de empleados -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Sección de Asistencia -->
        <div id="section-asistencia" class="hidden">
            <!-- Subir Archivo de Asistencia -->
            <section id="upload-section">
                <h2>Subir Archivo de Asistencia</h2>
                <form id="upload-form">
                    <label for="attendanceFile">Selecciona un archivo de asistencia:</label>
                    <input type="file" id="attendanceFile" name="attendanceFile" accept=".dat, .txt" required>
                    
                    <label for="attendanceDate">Fecha de Asistencia:</label>
                    <input type="date" id="attendanceDate" name="attendanceDate" required>
                    
                    <button type="submit">Procesar y Almacenar</button>
                </form>
                <div id="upload-message"></div>
            </section>

            <hr>

            <!-- Archivos de Asistencia Almacenados -->
            <section id="stored-files-section">
                <h2>Archivos de Asistencia Almacenados</h2>
                
                <!-- Buscar Archivos -->
                <div class="search-container">
                    <input type="text" id="search-files-input" placeholder="Buscar archivos por nombre o ID...">
                </div>
                
                <!-- Tabla de Archivos de Asistencia -->
                <div class="table-responsive">
                    <table id="attendance-files-table">
                        <thead>
                            <tr>
                                <th>ID Archivo</th>
                                <th>Nombre Archivo</th>
                                <th>Fecha Asistencia</th>
                                <th>Fecha de Subida</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filas de archivos de asistencia -->
                        </tbody>
                    </table>
                </div>
            </section>

            <hr>

            <!-- Resultados Emparejados -->
            <section id="matched-results-section">
                <h2>Resultados Emparejados</h2>
                
                <!-- Buscar Resultados -->
                <div class="search-container">
                    <input type="text" id="search-results-input" placeholder="Buscar resultados por nombre, ID o área...">
                </div>
                
                <!-- Contenedor de Resultados Emparejados -->
                <div id="matched-results-container">
                    <!-- Resultados emparejados -->
                </div>
                <button id="export-all-btn">Descargar Todos los Resultados en Excel</button>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
